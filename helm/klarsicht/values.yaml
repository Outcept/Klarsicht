# Extra labels added to all resources
commonLabels: {}
#  environment: production
#  team: platform

# Pod-level security context (applies to agent + dashboard pods)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context (applies to every container)
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# emptyDir volumes for readOnlyRootFilesystem support
# Mounts writable tmpfs dirs so nginx/uvicorn can write pid, cache, logs
emptyDirVolumes:
  enabled: false            # set true when using readOnlyRootFilesystem: true

imagePullSecrets: []
#  - name: gitlab-registry

agent:
  image:
    repository: ghcr.io/outcept/klarsicht/agent
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  watchNamespaces: []        # empty = all namespaces
  metricsEndpoint: ""        # Prometheus: http://prometheus:9090, Mimir: http://mimir:9009/prometheus
  llmProvider: anthropic     # anthropic, openai, ollama, watsonx
  llmModel: ""               # auto-detected if empty (claude-sonnet-4-20250514, gpt-4o, llama3.1, granite-3-8b-instruct)
  llmApiKey: ""              # from secret ref (not needed for ollama)
  llmBaseUrl: ""             # ollama/custom/watsonx: http://ollama:11434/v1 or internal watsonx URL
  watsonxProjectId: ""       # watsonx only: IBM project ID
  llmProfile: auto           # auto, full, compact — compact for small models (<30B)
  llmMaxToolCalls: 0         # 0 = auto (full: 20, compact: 8)
  peerWebhookUrls: ""        # comma-separated peer URLs for alert fan-out + comparison
  # Multi-cluster
  mode: standalone            # standalone, backend, agent
  clusterName: ""             # agent mode: name of this cluster (e.g. "prod-eu-1")
  joinToken: ""               # shared secret for agent<->backend registration
  backendUrl: ""              # agent mode: URL of the central backend
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

dashboard:
  image:
    repository: ghcr.io/outcept/klarsicht/dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  auth:
    htpasswd: ""  # Generate with: htpasswd -nb user password
  # OIDC authentication (optional — enables team-based access control)
  oidc:
    enabled: false
    issuerUrl: ""             # https://login.microsoftonline.com/{tenant}/v2.0
    clientId: ""
    clientSecret: ""
    claimMapping: ""          # JSON: {"department": "team"}
    teamMappings: ""          # JSON: {"XY-Z": ["XY-Z1", "XY-Z2"]}
    adminTeams: ""            # comma-separated: sre,admin
  ingress:
    enabled: false
    className: ""
    host: ""
    tls: []

postgres:
  enabled: true              # set false to use external DB
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  storage: 5Gi
  storageClassName: ""
  password: ""               # auto-generated if empty
  # Override pod/container security context for postgres only
  # If not set, falls back to the global podSecurityContext / containerSecurityContext
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

grafana:
  webhookPath: /alert
  webhookSecret: ""          # HMAC shared secret

# GitLab integration (read-only: pipelines, MRs, deployments, code)
gitlab:
  enabled: false
  url: https://gitlab.com     # or self-hosted URL
  token: ""                   # PAT with read_api + read_repository scope
  project: ""                 # e.g. "mygroup/myproject" or numeric ID

# Notifications
teams:
  webhookUrl: ""              # Microsoft Teams Incoming Webhook URL

slack:
  webhookUrl: ""              # Slack Incoming Webhook URL

discord:
  webhookUrl: ""              # Discord Webhook URL

# Confluence integration (BHB / operations handbooks)
confluence:
  enabled: false
  url: ""                       # https://company.atlassian.net/wiki or https://confluence.company.com
  user: ""                      # Cloud: email address, Server/DC: leave empty for PAT
  token: ""                     # API token (Cloud) or Personal Access Token (Server/DC)
  spaces: ""                    # comma-separated space keys: "OPS,INFRA,PLATFORM"

# Dashboard URL for links in notifications
dashboardUrl: ""              # e.g. https://klarsicht.dev

# Optional components (disable for lightweight test instances)
landing:
  enabled: false

site:
  enabled: false

# Override the database URL when using an external database
externalDatabase:
  url: ""
