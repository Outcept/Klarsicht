apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "klarsicht.fullname" . }}-dashboard-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.dashboard.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Dashboard assets — served from absolute /assets/ in both modes
        location /assets/ {
            root /usr/share/nginx/html;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # OIDC callback + auth endpoints proxy to agent (BFF flow)
        location /oauth2/callback {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/oauth2/callback;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location /auth/ {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        {{- if .Values.landing.enabled }}
        # Landing page at root
        location = / {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-landing.{{ .Release.Namespace }}.svc:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /favicon.svg {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-landing.{{ .Release.Namespace }}.svc:80/favicon.svg;
            proxy_set_header Host $host;
        }

        # /app without trailing slash → redirect to /app/
        location = /app {
            return 302 /app/;
        }

        # Dashboard SPA at /app/ — serves index.html for any /app/* path
        location /app/ {
            {{- if not .Values.dashboard.oidc.enabled }}
            auth_basic "Klarsicht Dashboard";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            {{- end }}
            alias /usr/share/nginx/html/;
            try_files $uri /app/index.html;
        }
        {{- else }}
        # No landing page — dashboard SPA at root, falls back to index.html for SPA routing
        location / {
            {{- if not .Values.dashboard.oidc.enabled }}
            auth_basic "Klarsicht Dashboard";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            {{- end }}
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
        {{- end }}

        # Webhook endpoint — open for Grafana (no auth)
        location = /api/alert {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/alert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — protected (dashboard calls it)
        location /api/ {
            {{- if not .Values.dashboard.oidc.enabled }}
            auth_basic "Klarsicht";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            {{- end }}

            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        {{- if .Values.site.enabled }}
        # Docs & Blog (Hugo)
        location /docs/ {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-site.{{ .Release.Namespace }}.svc:80/docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /blog/ {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-site.{{ .Release.Namespace }}.svc:80/blog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /css/ {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-site.{{ .Release.Namespace }}.svc:80/css/;
            proxy_set_header Host $host;
        }
        {{- end }}

        # Health check
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
