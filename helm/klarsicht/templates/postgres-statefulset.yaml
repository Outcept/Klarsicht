{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "klarsicht.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "klarsicht.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "klarsicht.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "klarsicht.postgres.podLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- if .Values.postgres.podSecurityContext }}
        {{- toYaml .Values.postgres.podSecurityContext | nindent 8 }}
        {{- else }}
        {{- include "klarsicht.podSecurityContext" . | nindent 8 }}
        {{- end }}
      containers:
        - name: postgres
          securityContext:
            {{- if .Values.postgres.containerSecurityContext }}
            {{- toYaml .Values.postgres.containerSecurityContext | nindent 12 }}
            {{- else }}
            {{- include "klarsicht.containerSecurityContext" . | nindent 12 }}
            {{- end }}
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: klarsicht
            - name: POSTGRES_USER
              value: klarsicht
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - klarsicht
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - klarsicht
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "klarsicht.postgres.selectorLabels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClassName }}
        storageClassName: {{ .Values.postgres.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
