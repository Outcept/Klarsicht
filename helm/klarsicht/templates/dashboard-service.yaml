apiVersion: v1
kind: Service
metadata:
  name: {{ include "klarsicht.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.dashboard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "klarsicht.dashboard.selectorLabels" . | nindent 4 }}
