apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "klarsicht.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      {{- include "klarsicht.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "klarsicht.agent.podLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "klarsicht.serviceAccountName" . }}
      securityContext:
        {{- include "klarsicht.podSecurityContext" . | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          securityContext:
            {{- include "klarsicht.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: KLARSICHT_LLM_PROVIDER
              value: {{ .Values.agent.llmProvider | quote }}
            {{- if .Values.agent.llmModel }}
            - name: KLARSICHT_LLM_MODEL
              value: {{ .Values.agent.llmModel | quote }}
            {{- end }}
            {{- if .Values.agent.llmBaseUrl }}
            - name: KLARSICHT_LLM_BASE_URL
              value: {{ .Values.agent.llmBaseUrl | quote }}
            {{- end }}
            {{- if .Values.agent.watsonxProjectId }}
            - name: KLARSICHT_WATSONX_PROJECT_ID
              value: {{ .Values.agent.watsonxProjectId | quote }}
            {{- end }}
            - name: KLARSICHT_LLM_PROFILE
              value: {{ .Values.agent.llmProfile | default "auto" | quote }}
            {{- if .Values.agent.llmMaxToolCalls }}
            - name: KLARSICHT_LLM_MAX_TOOL_CALLS
              value: {{ .Values.agent.llmMaxToolCalls | quote }}
            {{- end }}
            - name: KLARSICHT_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: llm-api-key
            - name: KLARSICHT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: webhook-secret
            {{- if .Values.agent.metricsEndpoint }}
            - name: KLARSICHT_MIMIR_ENDPOINT
              value: {{ .Values.agent.metricsEndpoint | quote }}
            {{- end }}
            - name: KLARSICHT_WATCH_NAMESPACES
              value: {{ include "klarsicht.watchNamespaces" . | quote }}
            {{- if .Values.postgres.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: postgres-password
            - name: KLARSICHT_DATABASE_URL
              value: {{ include "klarsicht.databaseURL" . | quote }}
            {{- else if .Values.externalDatabase.url }}
            - name: KLARSICHT_DATABASE_URL
              value: {{ .Values.externalDatabase.url | quote }}
            {{- end }}
            {{- if .Values.slack.webhookUrl }}
            - name: KLARSICHT_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: slack-webhook-url
            {{- end }}
            {{- if .Values.gitlab.enabled }}
            - name: KLARSICHT_GITLAB_URL
              value: {{ .Values.gitlab.url | quote }}
            - name: KLARSICHT_GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: gitlab-token
            - name: KLARSICHT_GITLAB_PROJECT
              value: {{ .Values.gitlab.project | quote }}
            {{- end }}
            {{- if .Values.teams.webhookUrl }}
            - name: KLARSICHT_TEAMS_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: teams-webhook-url
            {{- end }}
            {{- if .Values.discord.webhookUrl }}
            - name: KLARSICHT_DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: discord-webhook-url
            {{- end }}
            {{- if .Values.dashboardUrl }}
            - name: KLARSICHT_DASHBOARD_URL
              value: {{ .Values.dashboardUrl | quote }}
            {{- end }}
            {{- if .Values.dashboard.oidc.enabled }}
            - name: KLARSICHT_AUTH_ENABLED
              value: "true"
            - name: KLARSICHT_OIDC_ISSUER_URL
              value: {{ .Values.dashboard.oidc.issuerUrl | quote }}
            - name: KLARSICHT_OIDC_CLIENT_ID
              value: {{ .Values.dashboard.oidc.clientId | quote }}
            {{- if .Values.dashboard.oidc.clientSecret }}
            - name: KLARSICHT_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- if .Values.dashboard.oidc.claimMapping }}
            - name: KLARSICHT_AUTH_CLAIM_MAPPING
              value: {{ .Values.dashboard.oidc.claimMapping | quote }}
            {{- end }}
            {{- if .Values.dashboard.oidc.teamMappings }}
            - name: KLARSICHT_AUTH_TEAM_MAPPINGS
              value: {{ .Values.dashboard.oidc.teamMappings | quote }}
            {{- end }}
            {{- if .Values.dashboard.oidc.adminTeams }}
            - name: KLARSICHT_AUTH_ADMIN_TEAMS
              value: {{ .Values.dashboard.oidc.adminTeams | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.confluence.enabled }}
            - name: KLARSICHT_CONFLUENCE_URL
              value: {{ .Values.confluence.url | quote }}
            {{- if .Values.confluence.user }}
            - name: KLARSICHT_CONFLUENCE_USER
              value: {{ .Values.confluence.user | quote }}
            {{- end }}
            - name: KLARSICHT_CONFLUENCE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: confluence-token
            {{- if .Values.confluence.spaces }}
            - name: KLARSICHT_CONFLUENCE_SPACES
              value: {{ .Values.confluence.spaces | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.agent.peerWebhookUrls }}
            - name: KLARSICHT_PEER_WEBHOOK_URLS
              value: {{ .Values.agent.peerWebhookUrls | quote }}
            {{- end }}
            {{- if ne .Values.agent.mode "standalone" }}
            - name: KLARSICHT_MODE
              value: {{ .Values.agent.mode | quote }}
            {{- end }}
            {{- if .Values.agent.clusterName }}
            - name: KLARSICHT_CLUSTER_NAME
              value: {{ .Values.agent.clusterName | quote }}
            {{- end }}
            {{- if .Values.agent.joinToken }}
            - name: KLARSICHT_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "klarsicht.agent.secretName" . }}
                  key: join-token
            {{- end }}
            {{- if .Values.agent.backendUrl }}
            - name: KLARSICHT_BACKEND_URL
              value: {{ .Values.agent.backendUrl | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.emptyDirVolumes.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      {{- if .Values.emptyDirVolumes.enabled }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
