apiVersion: apps/v1
kind: Deployment
metadata:
  name: klarsicht-landing
  labels:
    app.kubernetes.io/name: klarsicht-landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: klarsicht-landing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: klarsicht-landing
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: landing
          image: registry.gitlab.com/outcept/klarsicht/landing:latest
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: klarsicht-landing
  labels:
    app.kubernetes.io/name: klarsicht-landing
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: klarsicht-landing
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klarsicht-landing
  labels:
    app.kubernetes.io/name: klarsicht-landing
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - www.klarsicht.ch
      secretName: klarsicht-ch-tls
  rules:
    - host: www.klarsicht.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: klarsicht-landing
                port:
                  name: http
