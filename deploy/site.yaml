apiVersion: apps/v1
kind: Deployment
metadata:
  name: klarsicht-site
  labels:
    app.kubernetes.io/name: klarsicht-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: klarsicht-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: klarsicht-site
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: site
          image: registry.gitlab.com/outcept/klarsicht/site:latest
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: klarsicht-site
  labels:
    app.kubernetes.io/name: klarsicht-site
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: klarsicht-site
