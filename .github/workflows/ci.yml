name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/outcept/klarsicht

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v

  build-agent:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/agent:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/agent:latest

  build-dashboard:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/dashboard:latest

  publish-helm:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
      - name: Package chart
        run: helm package helm/klarsicht --destination .helm-pkg
      - name: Checkout gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          # Keep only chart packages and index
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '*.tgz' ! -name 'index.yaml' -exec rm -rf {} +
      - name: Update index and push
        run: |
          cp .helm-pkg/*.tgz .
          helm repo index . --url https://outcept.github.io/Klarsicht
          git add *.tgz index.yaml
          git commit -m "Publish Helm chart $(ls *.tgz | head -1)" || true
          git push origin gh-pages
