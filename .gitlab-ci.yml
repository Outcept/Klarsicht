stages:
  - test
  - build
  - deploy

variables:
  AGENT_IMAGE: ${CI_REGISTRY_IMAGE}/agent
  DASHBOARD_IMAGE: ${CI_REGISTRY_IMAGE}/dashboard
  LANDING_IMAGE: ${CI_REGISTRY_IMAGE}/landing
  SITE_IMAGE: ${CI_REGISTRY_IMAGE}/site

# --- Test ---

test:
  stage: test
  image: python:3.13-slim
  script:
    - pip install -e ".[dev]"
    - python -m pytest tests/ -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Build ---

build-agent:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.agent"
      --destination "${AGENT_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${AGENT_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-dashboard:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.dashboard"
      --destination "${DASHBOARD_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${DASHBOARD_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-landing:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.landing"
      --destination "${LANDING_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${LANDING_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-site:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.site"
      --destination "${SITE_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${SITE_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Deploy ---
# Requires CI/CD variables:
#   KLARSICHT_LLM_API_KEY    - Anthropic API key
#   KLARSICHT_WEBHOOK_SECRET - HMAC secret for Grafana webhook (optional)
# Uses GitLab agent from outcept/kubernetes-agent-setup:test-agent

deploy:
  stage: deploy
  image:
    name: dtzar/helm-kubectl:3.17.3
    entrypoint: [""]
  before_script:
    - kubectl config use-context outcept/kubernetes-agent-setup:test-agent
    - kubectl cluster-info
    - >-
      kubectl create secret docker-registry gitlab-registry
      --namespace=klarsicht
      --docker-server=${CI_REGISTRY}
      --docker-username=${CI_REGISTRY_USER}
      --docker-password=${CI_REGISTRY_PASSWORD}
      --dry-run=client -o yaml | kubectl apply -f -
  script:
    - kubectl -n klarsicht apply -f deploy/landing.yaml -f deploy/site.yaml
    - kubectl -n klarsicht set image deployment/klarsicht-landing landing=${LANDING_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - kubectl -n klarsicht set image deployment/klarsicht-site site=${SITE_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - >-
      helm upgrade --install klarsicht helm/klarsicht/
      -f helm/values-vibebros.yaml
      -n klarsicht --create-namespace
      --set agent.image.tag=${CI_COMMIT_SHORT_SHA}
      --set dashboard.image.tag=${CI_COMMIT_SHORT_SHA}
      --set agent.llmApiKey=${KLARSICHT_LLM_API_KEY}
      --set grafana.webhookSecret=${KLARSICHT_WEBHOOK_SECRET:-""}
      --set gitlab.token=${KLARSICHT_GITLAB_TOKEN:-""}
      --set slack.webhookUrl=${KLARSICHT_SLACK_WEBHOOK_URL:-""}
      --set agent.peerWebhookUrls="http://klarsicht-openrouter-agent.klarsicht-openrouter.svc:8000\,http://klarsicht-gamma-agent.klarsicht-gamma.svc:8000"
      --wait --timeout 5m
  environment:
    name: production
    kubernetes:
      namespace: klarsicht
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-openrouter:
  stage: deploy
  image:
    name: dtzar/helm-kubectl:3.17.3
    entrypoint: [""]
  before_script:
    - kubectl config use-context outcept/kubernetes-agent-setup:test-agent
    - kubectl create namespace klarsicht-openrouter --dry-run=client -o yaml | kubectl apply -f -
    - >-
      kubectl create secret docker-registry gitlab-registry
      --namespace=klarsicht-openrouter
      --docker-server=${CI_REGISTRY}
      --docker-username=${CI_REGISTRY_USER}
      --docker-password=${CI_REGISTRY_PASSWORD}
      --dry-run=client -o yaml | kubectl apply -f -
  script:
    - >-
      helm upgrade --install klarsicht-openrouter helm/klarsicht/
      -n klarsicht-openrouter --create-namespace
      --set imagePullSecrets[0].name=gitlab-registry
      --set agent.image.repository=${CI_REGISTRY_IMAGE}/agent
      --set agent.image.tag=${CI_COMMIT_SHORT_SHA}
      --set dashboard.image.repository=${CI_REGISTRY_IMAGE}/dashboard
      --set dashboard.image.tag=${CI_COMMIT_SHORT_SHA}
      --set agent.llmProvider=openai
      --set agent.llmBaseUrl=https://openrouter.ai/api/v1
      --set agent.llmApiKey=${KLARSICHT_OPENROUTER_API_KEY}
      --set agent.llmModel=qwen/qwen-2.5-72b-instruct
      --set agent.llmProfile=compact
      --set agent.metricsEndpoint=http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
      --set agent.watchNamespaces[0]=demo
      --set dashboard.ingress.enabled=true
      --set dashboard.ingress.className=haproxy
      --set dashboard.ingress.host=test.klarsicht.dev
      --set "dashboard.ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod"
      --set dashboard.ingress.tls[0].hosts[0]=test.klarsicht.dev
      --set dashboard.ingress.tls[0].secretName=klarsicht-test-tls
      --wait --timeout 5m
  environment:
    name: openrouter-test
    kubernetes:
      namespace: klarsicht-openrouter
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-gamma:
  stage: deploy
  image:
    name: dtzar/helm-kubectl:3.17.3
    entrypoint: [""]
  before_script:
    - kubectl config use-context outcept/kubernetes-agent-setup:test-agent
    - kubectl create namespace klarsicht-gamma --dry-run=client -o yaml | kubectl apply -f -
    - >-
      kubectl create secret docker-registry gitlab-registry
      --namespace=klarsicht-gamma
      --docker-server=${CI_REGISTRY}
      --docker-username=${CI_REGISTRY_USER}
      --docker-password=${CI_REGISTRY_PASSWORD}
      --dry-run=client -o yaml | kubectl apply -f -
  script:
    - >-
      helm upgrade --install klarsicht-gamma helm/klarsicht/
      -n klarsicht-gamma --create-namespace
      --set imagePullSecrets[0].name=gitlab-registry
      --set agent.image.repository=${CI_REGISTRY_IMAGE}/agent
      --set agent.image.tag=${CI_COMMIT_SHORT_SHA}
      --set dashboard.image.repository=${CI_REGISTRY_IMAGE}/dashboard
      --set dashboard.image.tag=${CI_COMMIT_SHORT_SHA}
      --set agent.llmProvider=openai
      --set agent.llmBaseUrl=https://openrouter.ai/api/v1
      --set agent.llmApiKey=${KLARSICHT_OPENROUTER_API_KEY}
      --set agent.llmModel=google/gemma-4-27b-it-e4b
      --set agent.llmProfile=compact
      --set agent.metricsEndpoint=http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
      --set agent.watchNamespaces[0]=demo
      --set dashboard.ingress.enabled=true
      --set dashboard.ingress.className=haproxy
      --set dashboard.ingress.host=gamma.klarsicht.dev
      --set "dashboard.ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-prod"
      --set dashboard.ingress.tls[0].hosts[0]=gamma.klarsicht.dev
      --set dashboard.ingress.tls[0].secretName=klarsicht-gamma-tls
      --set dashboardUrl=https://gamma.klarsicht.dev
      --set postgres.storageClassName=local-path
      --wait --timeout 5m
  environment:
    name: gamma-test
    kubernetes:
      namespace: klarsicht-gamma
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
