# test-crashloop.yaml
# A deployment that deliberately crash-loops due to a missing DATABASE_URL env var.
# Apply this to test Klarsicht's RCA pipeline end-to-end.
#
# Usage:
#   kubectl apply -f test-crashloop.yaml
#   Watch Klarsicht investigate: https://klarsicht.vibebros.net/incidents
#   Clean up: kubectl delete -f test-crashloop.yaml
#
# What happens:
#   The container starts, checks for DATABASE_URL, prints an error, and exits 1.
#   Kubernetes restarts it, causing CrashLoopBackOff within ~1 minute.
#   If you have a Grafana alert rule for CrashLoopBackOff (see Setup page),
#   Klarsicht will automatically pick it up and run a full investigation.

apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-crashloop
  namespace: demo
  labels:
    app: test-crashloop
    purpose: klarsicht-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-crashloop
  template:
    metadata:
      labels:
        app: test-crashloop
    spec:
      containers:
        - name: app
          image: python:3.13-slim
          command:
            - python3
            - "-c"
            - |
              import os, sys, time
              time.sleep(2)  # Brief pause so logs are visible
              db_url = os.environ.get("DATABASE_URL")
              if not db_url:
                  print("ERROR: DATABASE_URL environment variable is not set", file=sys.stderr)
                  print("The application cannot start without a database connection.", file=sys.stderr)
                  sys.exit(1)
              print(f"Connected to {db_url}")
          # Note: DATABASE_URL is intentionally NOT set, causing the crash.
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
            requests:
              memory: "32Mi"
              cpu: "50m"
